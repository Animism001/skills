<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>概念构建 — 复杂适应系统理论</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f23;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Serif SC', serif;
    padding: 20px;
  }

  .card-wrapper {
    width: 100%;
    max-width: 760px;        /* 720 SVG + 20*2 padding */
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 120px rgba(201, 169, 97, 0.05);
  }

  /* 响应式 SVG：宽度自适应容器，高度按 viewBox 比例自动缩放 */
  .concept-card-svg {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 6px;
  }
</style>
</head>
<body>

<div class="card-wrapper">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 507" class="concept-card-svg">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="40%" r="70%" fx="50%" fy="40%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <linearGradient id="sepGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a4358" stop-opacity="0"/>
      <stop offset="15%" stop-color="#4a4358" stop-opacity="1"/>
      <stop offset="85%" stop-color="#4a4358" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4a4358" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="diamondGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a961" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c9a961" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="borderGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.788  0 0 0 0 0.663  0 0 0 0 0.380  0 0 0 0.35 0" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-2%" y="-5%" width="104%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(201, 169, 97, 0.03)" stroke-width="0.5"/>
    </pattern>
    <filter id="noiseTexture" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="faintNoise">
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faintNoise" mode="overlay"/>
    </filter>
  </defs>
  <style>
    .concept-card { transition: all 0.2s ease; }
    .concept-card:hover { filter: brightness(1.3); }
    .concept-card:hover .card-bg { fill: rgba(201, 169, 97, 0.12); stroke: rgba(201, 169, 97, 0.35); stroke-width: 0.8; }
    .concept-card:hover .card-text { fill: #f0e6d3; }
    .axiom-card { transition: all 0.2s ease; }
    .axiom-card:hover { filter: brightness(1.2); }
    .axiom-card:hover .card-bg { fill: rgba(201, 169, 97, 0.10); stroke: rgba(201, 169, 97, 0.30); }
  </style>
